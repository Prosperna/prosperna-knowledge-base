
openapi: 3.0.3
info:
  title: Multi-Location Store API
  version: 1.0.0
  description: API secured by API Key + HMAC for multi-store product and order management.
servers:
  - url: http://localhost:3000/v1
    description: Local Development Server
  - url: https://prodev.prosperna.ph/v1
    description: Development Server
  - url: https://prostage.prosperna.ph/v1
    description: Staging Server
  - url: https://p1.prosperna.com/v1
    description: Production Server

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
    SignatureAuth:
      type: apiKey
      in: header
      name: X-Signature
    Timestamp:
      type: apiKey
      in: header
      name: X-Timestamp

  schemas:
    Store:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        location:
          type: object
          properties:
            address: { type: string }
            city: { type: string }
            province: { type: string }
            zipcode: { type: string }
            coordinates:
              type: object
              properties:
                lat: { type: number }
                long: { type: number }
    Product:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        price:
          type: number
        is_available:
          type: boolean
    CartItem:
      type: object
      properties:
        product_id:
          type: string
        name:
          type: string
        price:
          type: number
        quantity:
          type: integer
    Order:
      type: object
      properties:
        cart_id:
          type: string
        delivery_type:
          type: string
          enum: [pickup, delivery]
        delivery_address:
          type: string

security:
  - ApiKeyAuth: []
  - SignatureAuth: []
  - Timestamp: []

paths:
  /session/location:
    post:
      summary: Set active store location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                store_id:
                  type: string
      responses:
        '200': { description: Store set }
    get:
      summary: Get active store location
      responses:
        '200':
          description: Current session store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Store'

  /stores:
    get:
      summary: Get all stores
      responses:
        '200':
          description: List of stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Store'

  /stores/{store_id}:
    get:
      summary: Get store by ID
      parameters:
        - name: store_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Store data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Store'

  /stores/{store_id}/products:
    get:
      summary: Get products for a store
      parameters:
        - name: store_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'

  /stores/{store_id}/products/{product_id}:
    get:
      summary: Get specific product by ID from a store
      parameters:
        - name: store_id
          in: path
          required: true
          schema:
            type: string
        - name: product_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

  /stores/{store_id}/cart:
    get:
      summary: Get current cart
      parameters:
        - name: store_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cart items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CartItem'

  /stores/{store_id}/cart/items:
    post:
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItem'
      responses:
        '201': { description: Item added }

  /stores/{store_id}/cart/items/{item_id}:
    patch:
      summary: Update cart item
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: integer
      responses:
        '200': { description: Updated }
    delete:
      summary: Remove cart item
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204': { description: Deleted }

  /stores/{store_id}/orders:
    post:
      summary: Place an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
      responses:
        '201': { description: Order placed }

  /stores/{store_id}/orders/{order_id}:
    get:
      summary: Get order by ID
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

  /stores/{store_id}/fulfillment-options:
    get:
      summary: Get fulfillment options per store
      responses:
        '200':
          description: Options available
          content:
            application/json:
              schema:
                type: object
                properties:
                  pickup:
                    type: boolean
                  delivery:
                    type: boolean
                  delivery_radius_km:
                    type: number
